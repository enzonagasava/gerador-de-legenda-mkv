<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Tradutor de Legendas MKV</title>
    <style>
      body { font-family: sans-serif; margin: 0; padding: 0; }
      header { padding: 1rem 2rem; border-bottom: 1px solid #ddd; display: flex; gap: 1rem; align-items: center; justify-content: space-between; }
      main { padding: 2rem; }
      nav a { margin-right: 1rem; }
      table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
      th, td { border-bottom: 1px solid #eee; padding: 0.6rem; text-align: left; vertical-align: top; }
      pre { background: #f6f6f6; padding: 1rem; overflow: auto; }
      .muted { color: #666; }
      .actions a { margin-right: 1rem; }
      .card { border: 1px solid #ddd; border-radius: 6px; padding: 1rem; margin-top: 1rem; }
    </style>
  </head>
  <body>
    <header>
      <div>
        <strong>Tradutor de Legendas</strong>
        <div class="muted">{{ request.user.username }}</div>
      </div>
      <nav class="actions">
        <a href="{% url 'web-job-list' %}">Jobs</a>
        <a href="{% url 'web-job-create' %}">Criar Job</a>
        <a href="{% url 'web-logout' %}">Sair</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
